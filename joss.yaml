name: joss_notify
version: 2.0.0
description: Plugin oficial para envío de notificaciones Push (FCM) y notificaciones internas en Joss.
repository: https://github.com/josprox/joss_notify
license: MIT
type: joss
environment:
  joss: ">=3.6.0"
entry:
  main: src/plugin.joss
native:
  protocol: joss-rpc-v1
  windows-amd64: native/windows-amd64/joss_notify.exe
  windows-arm64: native/windows-arm64/joss_notify.exe
  linux-amd64: native/linux-amd64/joss_notify
  linux-arm64: native/linux-arm64/joss_notify
  darwin-amd64: native/darwin-amd64/joss_notify
  darwin-arm64: native/darwin-arm64/joss_notify
dependencies:
